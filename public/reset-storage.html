        function displayCurrentStorage() {
            const storage = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                try {
                    storage[key] = JSON.parse(value);
                } catch {
                    storage[key] = value;
                }
            }
            
            document.getElementById('current-storage').innerHTML = 
                '<pre>' + JSON.stringify(storage, null, 2) + '</pre>';
        }

        function viewPartners() {
            const partners = localStorage.getItem('partners');
            const result = document.getElementById('result');
            
            if (!partners) {
                result.innerHTML = '<p class="error">❌ Aucun partenaire trouvé dans le localStorage</p>';
            } else {
                try {
                    const parsed = JSON.parse(partners);
                    result.innerHTML = 
                        '<h3 class="success">✅ Partenaires trouvés : ' + parsed.length + '</h3>' +
                        '<pre>' + JSON.stringify(parsed, null, 2) + '</pre>';
                } catch (e) {
                    result.innerHTML = '<p class="error">❌ Erreur de parsing : ' + e.message + '</p>';
                }
            }
        }

        function resetPartners() {
            localStorage.setItem('partners', JSON.stringify(initialPartners));
            const result = document.getElementById('result');
            result.innerHTML = '<p class="success">✅ Partenaires réinitialisés avec succès ! (' + initialPartners.length + ' partenaires)</p>';
            displayCurrentStorage();
            
            setTimeout(() => {
                if (confirm('Voulez-vous recharger la page pour voir les changements ?')) {
                    window.location.href = '/nos-partenaires';
                }
            }, 1000);
        }

        function resetAll() {
            if (confirm('⚠️ ATTENTION : Cela va supprimer TOUTES les données (biens, réservations, messages, etc.). Êtes-vous sûr ?')) {
                localStorage.clear();
                localStorage.setItem('partners', JSON.stringify(initialPartners));
                
                const result = document.getElementById('result');
                result.innerHTML = '<p class="success">✅ Tout a été réinitialisé !</p>';
                displayCurrentStorage();
                
                setTimeout(() => {
                    if (confirm('Voulez-vous recharger la page ?')) {
                        window.location.reload();
                    }
                }, 1000);
            }
        }

        // Afficher l'état au chargement
        displayCurrentStorage();
    </script>
